services:
  freightflow-ai-db:
    image: postgres:16-alpine
    container_name: freightflow-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: freightflow_ai
      POSTGRES_USER: freightflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightflow -d freightflow_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - freightflow-ai-postgres:/var/lib/postgresql/data
    networks:
      - freightclaw-net

  freightflow-ai-app:
    build: .
    container_name: freightflow-ai-app
    restart: unless-stopped
    depends_on:
      freightflow-ai-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://freightflow:${POSTGRES_PASSWORD}@freightflow-ai-db:5432/freightflow_ai?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
      OPENCLAW_API_URL: ${OPENCLAW_API_URL:-}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-}
      OPENCLAW_TIMEOUT_MS: ${OPENCLAW_TIMEOUT_MS:-30000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-FreightFlow AI}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_SECURE: ${IMAP_SECURE:-true}
      OCR_API_URL: ${OCR_API_URL:-}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-45000}
    volumes:
      - freightflow-ai-config:/app/.freightflow
    networks:
      - freightclaw-net

networks:
  freightclaw-net:
    external: true

volumes:
  freightflow-ai-postgres:
  freightflow-ai-config:
